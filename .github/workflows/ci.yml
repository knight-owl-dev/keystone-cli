name: CI

on:
  workflow_dispatch:  # Manual trigger runs all jobs
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-dotnet
      - name: Lint
        run: make lint-dotnet

  lint:
    runs-on: ubuntu-latest
    container: ghcr.io/knight-owl-dev/ci-tools:latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Lint
        run: make lint SKIP="lint-dotnet"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-dotnet

      - name: Test
        run: dotnet test ./tests/Keystone.Cli.UnitTests/Keystone.Cli.UnitTests.csproj -c Release

  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      packaging: ${{ steps.filter.outputs.packaging }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            packaging:
              - 'src/**/*.csproj'
              - 'Directory.Build.props'
              - 'nfpm.yaml'
              - 'scripts/package-deb.sh'
              - 'scripts/verify-deb-install.sh'
              - 'tests/deb/**'

  build-deb:
    name: Build .deb (${{ matrix.arch }})
    needs: changes
    if: needs.changes.outputs.packaging == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            rid: linux-x64
          - runner: ubuntu-24.04-arm
            arch: arm64
            rid: linux-arm64

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-dotnet

      - name: Publish
        env:
          RID: ${{ matrix.rid }}
        run: dotnet publish ./src/Keystone.Cli/Keystone.Cli.csproj -c Release -r "${RID}"

      - name: Build .deb package
        uses: ./.github/actions/build-deb
        with:
          rid: ${{ matrix.rid }}

      - name: Upload .deb artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deb-${{ matrix.rid }}
          path: artifacts/release/keystone-cli_*.deb
          if-no-files-found: error

  test-deb:
    name: Test .deb (${{ matrix.distro }}-${{ matrix.arch }})
    needs: [changes, build-deb]
    if: needs.changes.outputs.packaging == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.image }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            rid: linux-x64
            distro: debian
            image: debian:bookworm
          - runner: ubuntu-latest
            arch: amd64
            rid: linux-x64
            distro: ubuntu
            image: ubuntu:24.04
          - runner: ubuntu-24.04-arm
            arch: arm64
            rid: linux-arm64
            distro: debian
            image: debian:bookworm
          - runner: ubuntu-24.04-arm
            arch: arm64
            rid: linux-arm64
            distro: ubuntu
            image: ubuntu:24.04

    steps:
      - name: Checkout (for verify script)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: scripts
          sparse-checkout-cone-mode: false

      - name: Download .deb artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: deb-${{ matrix.rid }}
          path: deb

      - name: Verify installation
        # SAFE_ARCH is the validated architecture; * is left unquoted for globbing and "$SAFE_ARCH" is quoted after the glob.
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          SAFE_ARCH="$(./scripts/validate-arch.sh "${ARCH}")"
          ./scripts/verify-deb-install.sh ./deb/keystone-cli_*_"${SAFE_ARCH}".deb
